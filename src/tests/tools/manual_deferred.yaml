# Glimmer — ManualOnly and Deferred Scenario Registry
#
# This registry tracks verification scenarios that cannot yet be
# automated and require either manual human verification or are
# explicitly deferred with a stated reason.
#
# WORKG:WG8 — ManualOnly and Deferred discipline
#
# Format:
#   - anchor: TEST:Anchor.Name
#     status: ManualOnly | Deferred
#     reason: Why this cannot be automated yet
#
# This file is read by evidence_report.py to include manual/deferred
# scenarios in evidence output so they remain visible and honest.

